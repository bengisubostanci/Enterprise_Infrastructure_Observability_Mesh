version: '3.8'

networks:
  observability_mesh:
    driver: bridge

# Konteyner loglarını doğrudan Loki'ye üfleyen sürücü tanımı
x-logging: &default-logging
  logging:
    driver: loki
    options:
      loki-url: "http://localhost:3100/loki/api/v1/push"

services:
  # 1. NODE EXPORTER
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: enterprise_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    networks:
      - observability_mesh
    restart: unless-stopped
    <<: *default-logging

  # 2. PROMETHEUS
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: enterprise_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - observability_mesh
    depends_on:
      - node-exporter
    restart: unless-stopped
    <<: *default-logging

  # 3. GRAFANA
  grafana:
    image: grafana/grafana:10.4.1
    container_name: enterprise_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - observability_mesh
    depends_on:
      - prometheus
    restart: unless-stopped
    <<: *default-logging

  # 4. GRAFANA LOKI
  loki:
    image: grafana/loki:2.9.4
    container_name: enterprise_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - observability_mesh
    restart: unless-stopped

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local